<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>Gabes Game</title>
<style>
  body {
    margin: 0;

    width: 220px;

  a.card:hover { transform: translateY(-4px); border-color: #ffcc33; }

  <div class="cards">
    <a class="card" href="klotski-3d.html">
      <div class="title">Jogar em 3D</div>
      <div class="desc">Three.js, câmera orbital, peças rolando e som/música 8-bit</div>
